name: docker-image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-rum.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Refresh models catalog
        run: |
          set -euo pipefail
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate build metadata
        id: build
        shell: bash
        run: |
          set -euo pipefail

          version="latest"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          fi

          {
            echo "version=${version}"
            echo "commit=$(git rev-parse --short HEAD)"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.build.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.build.outputs.version }}
            COMMIT=${{ steps.build.outputs.commit }}
            BUILD_DATE=${{ steps.build.outputs.build_date }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish image summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### Docker image published"
            echo
            echo '```bash'
            echo "docker pull ${{ steps.image.outputs.name }}:latest"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "docker pull ${{ steps.image.outputs.name }}:${GITHUB_REF_NAME}"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
