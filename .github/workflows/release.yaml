name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            bin_ext: ''
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            bin_ext: ''
          - goos: windows
            goarch: amd64
            archive_ext: zip
            bin_ext: .exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            bin_ext: .exe
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            bin_ext: ''
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            bin_ext: ''
          - goos: freebsd
            goarch: amd64
            archive_ext: tar.gz
            bin_ext: ''
          - goos: freebsd
            goarch: arm64
            archive_ext: tar.gz
            bin_ext: ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate build metadata
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build executable
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          mkdir -p dist/package
          go build \
            -ldflags="-s -w -X 'main.Version=${VERSION}' -X 'main.Commit=${COMMIT}' -X 'main.BuildDate=${BUILD_DATE}'" \
            -o "dist/package/cli-proxy-api${BIN_EXT}" \
            ./cmd/server
          cp config.example.yaml dist/package/config.example.yaml
      - name: Create archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          archive_name="cli-proxy-rum_${GOOS}_${GOARCH}.${ARCHIVE_EXT}"
          rm -f "dist/${archive_name}"
          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            (cd dist/package && zip -qr "../${archive_name}" .)
          else
            tar -czf "dist/${archive_name}" -C dist/package .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-proxy-rum_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/cli-proxy-rum_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List executable assets
        run: ls -la dist
      - name: Publish executable assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
