services:
  cli-proxy-api-rum:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/lzt404/cliproxyapi-rum:latest}
    pull_policy: always
    container_name: cli-proxy-api-rum
    environment:
      CLI_PROXY_API_KEY: ${CLI_PROXY_API_KEY:-}
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:-}
    ports:
      - "${CLI_PROXY_BIND:-127.0.0.1}:${CLI_PROXY_PORT:-8317}:8317"
      - "${CLI_PROXY_BIND:-127.0.0.1}:8085:8085"
      - "${CLI_PROXY_BIND:-127.0.0.1}:1455:1455"
      - "${CLI_PROXY_BIND:-127.0.0.1}:54545:54545"
      - "${CLI_PROXY_BIND:-127.0.0.1}:51121:51121"
      - "${CLI_PROXY_BIND:-127.0.0.1}:11451:11451"
    volumes:
      - ${CLI_PROXY_DATA_PATH:-./cliproxy-data}:/data
      - ${CLI_PROXY_AUTH_PATH:-./cliproxy-data/auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./cliproxy-data/logs}:/CLIProxyAPI/logs
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command: |
      if [ ! -f /data/config.yaml ]; then
        if [ -z "$$CLI_PROXY_API_KEY" ]; then
          echo "CLI_PROXY_API_KEY is required for first startup." >&2
          echo "Example: CLI_PROXY_API_KEY=sk-your-local-key docker compose up -d" >&2
          exit 1
        fi

        mkdir -p /data /root/.cli-proxy-api /CLIProxyAPI/logs
        cat > /data/config.yaml <<EOF
      host: ""
      port: 8317
      remote-management:
        allow-remote: true
        secret-key: "$$MANAGEMENT_PASSWORD"
        disable-auto-update-panel: false
      auth-dir: "/root/.cli-proxy-api"
      logging-to-file: true
      usage-statistics-enabled: true
      redis-usage-queue-retention-seconds: 60
      api-keys:
        - "$$CLI_PROXY_API_KEY"
      EOF
      fi

      exec ./cli-proxy-api-rum --config /data/config.yaml
    restart: unless-stopped
